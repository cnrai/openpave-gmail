# OpenPAVE Gmail Skill
# Read and manage Gmail messages securely using OAuth

name: gmail
version: 2.0.0
description: Read, send, and manage Gmail messages securely using OAuth

author:
  name: cnrai
  url: https://github.com/cnrai

license: MIT
homepage: https://github.com/cnrai/openpave-gmail
repository: cnrai/openpave-gmail

# Execution pattern
pattern: sandbox
entrypoint: index.js

# Available commands
commands:
  - name: profile
    description: Get Gmail profile info
    options:
      - --summary
      - --json

  - name: list
    description: List recent messages
    options:
      - --max <number>
      - --summary
      - --json
      - --full
      - -q, --query <query>

  - name: unread
    description: Show unread messages
    options:
      - --max <number>
      - --summary
      - --json

  - name: read
    description: Read a specific message
    args:
      - <messageId>
    options:
      - --summary
      - --json

  - name: mark-read
    description: Mark messages as read
    args:
      - <messageId...>
    options:
      - --summary
      - --json

  - name: mark-unread
    description: Mark a message as unread
    args:
      - <messageId>
    options:
      - --summary
      - --json

  - name: trash
    description: Move messages to trash
    args:
      - <messageId...>
    options:
      - --summary
      - --json

  - name: attachments
    description: List attachments on a message
    args:
      - <messageId>
    options:
      - --summary
      - --json

  - name: download
    description: Download an attachment
    args:
      - <messageId>
      - <attachmentId>
    options:
      - -o, --output <file>
      - --json

  - name: draft
    description: Create a new draft email
    options:
      - --to <email>
      - --cc <email>
      - --bcc <email>
      - --subject <text>
      - --body <text>
      - --input <file>
      - --reply-to <messageId>
      - --json
      - --summary

  - name: drafts
    description: List draft emails
    options:
      - --max <number>
      - -q, --query <query>
      - --json
      - --summary

  - name: send-draft
    description: Send an existing draft
    args:
      - <draftId>
    options:
      - --json
      - --summary

  - name: delete-draft
    description: Delete a draft
    args:
      - <draftId>
    options:
      - --json
      - --summary

  - name: send
    description: Send an email directly
    options:
      - --to <email>
      - --cc <email>
      - --bcc <email>
      - --subject <text>
      - --body <text>
      - --input <file>
      - --json
      - --summary

  - name: reply
    description: Reply to an existing message
    args:
      - <messageId>
    options:
      - --to <email>
      - --cc <email>
      - --bcc <email>
      - --subject <text>
      - --body <text>
      - --input <file>
      - --draft
      - --json
      - --summary

# Token configuration for secure sandbox access
tokens:
  gmail:
    type: oauth
    description: Gmail API OAuth credentials
    domains:
      - gmail.googleapis.com
      - "*.googleapis.com"
    env:
      required:
        - GMAIL_CLIENT_ID
        - GMAIL_CLIENT_SECRET
        - GMAIL_REFRESH_TOKEN
      optional:
        - GMAIL_ACCESS_TOKEN
    config:
      env: GMAIL_ACCESS_TOKEN
      type: oauth
      domains:
        - gmail.googleapis.com
        - "*.googleapis.com"
      placement:
        type: header
        name: Authorization
        format: "Bearer {token}"
      refreshEnv: GMAIL_REFRESH_TOKEN
      refreshUrl: https://oauth2.googleapis.com/token
      clientIdEnv: GMAIL_CLIENT_ID
      clientSecretEnv: GMAIL_CLIENT_SECRET

# Sandbox permissions
permissions:
  fs.read: []
  fs.write: []
  network:
    - gmail.googleapis.com
    - oauth2.googleapis.com
  modules:
    - fs
    - path
  system: []

# Platform compatibility
platforms:
  - darwin
  - linux
  - win32

engines:
  node: ">=16.0.0"

# Metadata
keywords:
  - email
  - gmail
  - google
  - oauth
  - inbox
  - messages

category: communication
icon: "\U0001F4E7"
