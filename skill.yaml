# OpenPAVE Gmail Skill
# Read and manage Gmail messages securely using OAuth

name: gmail
version: 2.4.0
description: Read, send, and manage Gmail messages securely using OAuth

author:
  name: cnrai
  url: https://github.com/cnrai

license: MIT
homepage: https://github.com/cnrai/openpave-gmail
repository: cnrai/openpave-gmail

# Execution pattern
pattern: sandbox
entrypoint: index.js

# Available commands
commands:
  - name: profile
    description: Get Gmail profile info
    options:
      - --summary

  - name: list
    description: List recent messages
    options:
      - --max <number>
      - --summary
      - -q, --query <query>

  - name: unread
    description: Show unread messages
    options:
      - --max <number>
      - --summary

  - name: read
    description: Read a specific message
    args:
      - <messageId>
    options:
      - --summary

  - name: mark-read
    description: Mark messages as read
    args:
      - <messageId...>
    options:
      - --summary

  - name: mark-unread
    description: Mark a message as unread
    args:
      - <messageId>
    options:
      - --summary

  - name: trash
    description: Move messages to trash
    args:
      - <messageId...>
    options:
      - --summary

  - name: attachments
    description: List attachments on a message
    args:
      - <messageId>
    options:
      - --summary

  - name: download
    description: Download an attachment
    args:
      - <messageId>
      - <attachmentId>
    options:
      - -o, --output <file>
      - --summary

  - name: draft
    description: Create a new draft email
    options:
      - --summary
      - --to <email>
      - --cc <email>
      - --bcc <email>
      - --subject <text>
      - --body <text>
      - --input <file>
      - --reply-to <messageId>
      - --attach <file>

  - name: drafts
    description: List draft emails
    options:
      - --summary
      - --max <number>
      - -q, --query <query>

  - name: send-draft
    description: Send an existing draft
    args:
      - <draftId>
    options:
      - --summary

  - name: delete-draft
    description: Delete a draft
    args:
      - <draftId>
    options:
      - --summary

  - name: send
    description: Send an email directly
    options:
      - --summary
      - --to <email>
      - --cc <email>
      - --bcc <email>
      - --subject <text>
      - --body <text>
      - --input <file>
      - --attach <file>

  - name: reply
    description: Reply to an existing message
    args:
      - <messageId>
    options:
      - --summary
      - --to <email>
      - --cc <email>
      - --bcc <email>
      - --subject <text>
      - --body <text>
      - --input <file>
      - --attach <file>
      - --draft

# Token configuration for secure sandbox access
